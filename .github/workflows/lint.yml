name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy types-requests
      
      - name: Run flake8
        run: |
          flake8 *.py --max-line-length=120 --exclude=venv,__pycache__,.git --count --show-source --statistics
      
      - name: Check formatting with black
        run: |
          black --check *.py --line-length=120
      
      - name: Run mypy
        run: |
          mypy *.py --ignore-missing-imports
        continue-on-error: true
