name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy types-requests
      
      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 --exclude=venv,__pycache__,.git,.github,archives,build,dist --count --show-source --statistics
      
      - name: Check formatting with black
        run: |
          black --check . --line-length=120 --exclude="venv|__pycache__|.git|.github|archives|build|dist"
      
      - name: Run mypy
        run: |
          mypy . --ignore-missing-imports --exclude="venv|__pycache__|.git|.github|archives|build|dist"
        continue-on-error: true
